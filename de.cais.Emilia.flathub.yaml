# Flathub-EINREICHUNGS-Manifest für Emilia.
#
# Unterschied zum lokalen de.cais.Emilia.yaml: Die App-Quelle ist `type: git`
# (fester Tag/Commit) statt `type: dir`. Flathub baut ausschließlich aus dem
# gepushten, getaggten Stand des Repos — niemals aus dem Arbeitsverzeichnis.
#
# Für die Einreichung wird diese Datei nach `de.cais.Emilia.yaml` umbenannt ins
# Repo `flathub/de.cais.Emilia` gelegt, ZUSAMMEN mit generated-sources.json.
#
# Voraussetzungen, bevor das hier baut (siehe FLATHUB.md):
#   1. generated-sources.json, data/screenshots/ und alle Daten sind committet.
#   2. Ein Tag (z. B. v0.6.1) zeigt auf genau diesen Commit und ist gepusht.
#   3. `tag:`/`commit:` unten passend gesetzt – am besten via
#      `scripts/sync-flathub.sh` (zieht beides aus MetaInfo-Top-Release + Tag).
#
# Lokal testen (nachdem Tag gepusht ist):
#   flatpak-builder --user --install --force-clean build-dir \
#       de.cais.Emilia.flathub.yaml
id: de.cais.Emilia
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: emilia

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # Audio (PipeWire über die Pulse-Kompatibilität der Runtime)
  - --socket=pulseaudio
  # Online-Metadaten **und** Geräte-Synchronisierung im LAN (HTTPS-Server/-Client)
  - --share=network
  # GPU für die GTK4-Renderpipeline (zuvor Teil von --device=all). Der Kamera-
  # Zugriff für den QR-Scan läuft über das XDG-Kamera-Portal (PipeWire-fd via
  # `pipewiresrc`), daher KEIN Rohzugriff auf /dev/video* / kein `--device=all`.
  # Dekodierung in-process (rqrr), kein `zxing`-Plugin; `gtk4paintablesink`
  # (Vorschau) optional. (Halium/FuriOS nutzt den Selbst-Repo-Build mit
  # --device=all + EMILIA_CAMERA_SRC.)
  - --device=dri
  # Musikbibliothek: Standardzugriff nur auf den XDG-Musikordner. Weitere
  # Ordner werden über den GTK-Dateidialog ausgewählt; Schreibzugriff im
  # Musikordner ist für Stream-Aufnahmen und per Sync empfangene Audiodateien
  # nötig.
  - --filesystem=xdg-music
  # Sperrbildschirm/Medientasten: eigener MPRIS-Name (pro Prozess-Suffix)
  - --own-name=org.mpris.MediaPlayer2.Emilia.*
  # Sicherheitskritische Daten (Nextcloud-Benutzername/-App-Passwort sowie API-
  # Keys/Tokens wie AcoustID/fanart.tv) werden, wenn verfügbar, über libsecret
  # im Secret Service statt in der lokalen SQLite-Datenbank gespeichert.
  - --talk-name=org.freedesktop.secrets
  # Optionales Tray-Icon (StatusNotifierItem) – Registrierung beim Tray-Host.
  - --talk-name=org.kde.StatusNotifierWatcher
  # Übersetzungskataloge liegen privat unter /app (nicht in der Locale-Extension,
  # die nur die Gerätesprachen installiert), damit der eingebaute Sprachwähler
  # jede Sprache laden kann – unabhängig von der Systemsprache. Muss zum
  # Installationspfad im emilia-Modul unten passen.
  - --env=EMILIA_LOCALEDIR=/app/share/emilia/translations

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  # Kein Netzzugriff beim Build: cargo nutzt ausschließlich die vendored Crates.
  env:
    CARGO_HOME: /run/build/emilia/cargo

modules:
  # AcoustID-Fingerprint (fpcalc) mitliefern, damit die Track-Erkennung über
  # Chromaprint auch im Flatpak funktioniert (die Runtime enthält fpcalc nicht).
  # Gebaut mit dem in Chromaprint gebündelten KissFFT (keine externe FFT-
  # Abhängigkeit) und libswresample aus der Runtime zum Dekodieren; installiert
  # libchromaprint + fpcalc nach /app. Siehe src/core/fingerprint.rs.
  - name: chromaprint
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      # Chromaprint 1.5.1 deklariert cmake_minimum_required < 3.5; neuere CMake
      # (SDK) lehnt das sonst ab.
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DBUILD_TOOLS=ON
      - -DBUILD_TESTS=OFF
      - -DFFT_LIB=kissfft
      - -DAUDIO_PROCESSOR_LIB=swresample
    sources:
      - type: archive
        url: https://github.com/acoustid/chromaprint/releases/download/v1.6.0/chromaprint-1.6.0.tar.gz
        sha256: 9d33482e56a1389a37a0d6742c376139fa43e3b8a63d29003222b93db2cb40da
  # yt-dlp als gepinnte, sha256-verifizierte Binary mitliefern (statt sie zur
  # Laufzeit ungeprüft von GitHub zu laden → das spricht der Flathub-Reviewer an).
  # Flathubs `flatpak-external-data-checker` hält die Version über `x-checker-data`
  # automatisch aktuell und öffnet dafür selbständig Update-PRs — wir müssen den
  # Pin also NICHT bei jedem Commit von Hand nachziehen. Zusätzlich aktualisiert
  # die App eine neuere Version bei Bedarf in den Datenordner (Vorrang vor dieser
  # Baseline), siehe `src/core/youtube.rs`.
  - name: yt-dlp
    buildsystem: simple
    build-commands:
      - install -Dm755 yt-dlp /app/bin/yt-dlp
    sources:
      - type: file
        url: https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp
        sha256: 3bda0968a01cde70d26720653003b28553c71be14dcb2e5f4c24e9921fdad745
        x-checker-data:
          type: json
          url: https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name == "yt-dlp") | .browser_download_url
  - name: emilia
    buildsystem: simple
    build-commands:
      - cargo build --release --offline
      - install -Dm755 target/release/emilia /app/bin/emilia
      # Übersetzungskataloge (.po → .mo) für alle Sprachen aus po/LINGUAS bauen.
      # Bewusst NICHT nach /app/share/locale: flatpak-builder lagert dort liegende
      # Kataloge automatisch in die Locale-Extension (de.cais.Emilia.Locale) aus,
      # die nur die auf dem Gerät konfigurierten Sprachen installiert – auf einem
      # en-only-System fehlt damit der deutsche Katalog komplett. Emilia hat einen
      # eigenen Sprachwähler, also müssen ALLE Kataloge immer vorhanden sein:
      # privater Pfad + EMILIA_LOCALEDIR (siehe finish-args, src/i18n.rs).
      - |
        for lang in $(grep -v '^#' po/LINGUAS); do
          install -d /app/share/emilia/translations/$lang/LC_MESSAGES
          msgfmt --check po/$lang.po -o /app/share/emilia/translations/$lang/LC_MESSAGES/emilia.mo
        done
      - install -Dm644 data/de.cais.Emilia.desktop
        /app/share/applications/de.cais.Emilia.desktop
      - install -Dm644 data/de.cais.Emilia.metainfo.xml
        /app/share/metainfo/de.cais.Emilia.metainfo.xml
      - install -Dm644 data/icons/hicolor/256x256/apps/de.cais.Emilia.png
        /app/share/icons/hicolor/256x256/apps/de.cais.Emilia.png
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-concert-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-concert-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/list-high-priority-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/list-high-priority-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-favorite-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-favorite-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-audiobook-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-audiobook-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-stats-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-stats-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-share-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-share-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-sleep-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-sleep-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-filter-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-filter-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/im-youtube-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/im-youtube-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/ticket-special-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/ticket-special-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/xsi-view-more-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/xsi-view-more-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/podcast-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/podcast-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/internet-radio-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/internet-radio-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/multimedia-equalizer-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/multimedia-equalizer-symbolic.svg
    sources:
      # App-Quelle aus dem getaggten Git-Stand (Flathub baut nur hieraus).
      # Release 0.8.4 == MetaInfo-Top-Release; der Tag zeigt auf den Release-
      # Commit. Bei einem neuen Release NICHT von Hand pflegen, sondern
      # `scripts/sync-flathub.sh` laufen lassen (zieht tag + commit aus dem
      # MetaInfo-Top-Release + Git-Tag). Der pre-commit-Hook warnt bei Drift.
      - type: git
        url: https://github.com/misc-de/emilia.git
        tag: v0.8.4
        commit: d42185a29c7aa7d37f2fd4ef5ba6e96d1dd76b42
      # Gevendorte Cargo-Abhängigkeiten (offline-Build). Liegt im selben Ordner
      # wie dieses Manifest (im flathub-Repo neben de.cais.Emilia.yaml).
      - generated-sources.json
