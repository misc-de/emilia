# Flatpak-Manifest für Emilia.
#
# Lokal bauen & installieren:
#   flatpak install flathub org.gnome.Platform//49 org.gnome.Sdk//49 \
#       org.freedesktop.Sdk.Extension.rust-stable//25.08
#   flatpak-builder --user --install --force-clean build-dir de.cais.Emilia.yaml
#   flatpak run de.cais.Emilia
#
# Hinweis: Für eine Flathub-Einreichung dürfen Builds nicht ins Netz. Dann statt
# `--share=network` die Cargo-Abhängigkeiten vendoren (flatpak-cargo-generator
# erzeugt eine generated-sources.json) und `--offline` nutzen.
id: de.cais.Emilia
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: emilia

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Audio (PipeWire über die Pulse-Kompatibilität der Runtime)
  - --socket=pulseaudio
  # Online-Metadaten (optional, nur auf Knopfdruck)
  - --share=network
  # Musikbibliothek nur lesen (Dateien werden nie verändert)
  - --filesystem=home:ro
  # Sperrbildschirm/Medientasten: eigener MPRIS-Name (pro Prozess-Suffix)
  - --own-name=org.mpris.MediaPlayer2.Emilia.*

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  # Für den lokalen Build lädt cargo die Crates aus dem Netz.
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/emilia/cargo

modules:
  - name: emilia
    buildsystem: simple
    build-commands:
      - cargo build --release
      - install -Dm755 target/release/emilia /app/bin/emilia
      - install -Dm644 data/de.cais.Emilia.desktop
        /app/share/applications/de.cais.Emilia.desktop
      - install -Dm644 data/de.cais.Emilia.metainfo.xml
        /app/share/metainfo/de.cais.Emilia.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/de.cais.Emilia.svg
        /app/share/icons/hicolor/scalable/apps/de.cais.Emilia.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-concert-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-concert-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/list-high-priority-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/list-high-priority-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-favorite-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-favorite-symbolic.svg
      - install -Dm644 data/icons/hicolor/scalable/actions/emilia-audiobook-symbolic.svg
        /app/share/icons/hicolor/scalable/actions/emilia-audiobook-symbolic.svg
    sources:
      - type: dir
        path: .
