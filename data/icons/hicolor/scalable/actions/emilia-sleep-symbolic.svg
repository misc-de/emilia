    <path opacity="0.82" d="M6.6 6.3 H10 V7.35 H6.6 Z M6.6 8.65 H10 V9.7 H6.6 Z M8.95 6.3 L10 6.3 L7.65 9.7 L6.6 9.7 Z"/>
    <path opacity="0.64" d="M10.2 2.6 H13 V3.45 H10.2 Z M10.2 4.55 H13 V5.4 H10.2 Z M12.15 2.6 L13 2.6 L11.05 5.4 L10.2 5.4 Z"/>
  </g>
</svg>
