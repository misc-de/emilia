<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Handmikrofon in Seitenansicht: Kugelkopf mit Griff, diagonal (45°) ins Quadrat gelegt. -->
  <g fill="#2e3436" transform="rotate(45 8 8)">
    <!-- Griff: schlanker Körper mit rundem Ende, sitzt unter dem Kopf. -->
    <rect x="6.3" y="6.6" width="3.4" height="7.4" rx="1.7"/>
    <!-- Mesh-Kopf (Kugel) mit zwei Gitter-Schlitzen (evenodd = transparent). -->
    <path fill-rule="evenodd"
          d="M8 1.6 a3.2 3.2 0 1 1 0 6.4 a3.2 3.2 0 1 1 0 -6.4 Z
             M5.4 3.75 h5.2 v0.5 h-5.2 Z
             M5.4 5.15 h5.2 v0.5 h-5.2 Z"/>
  </g>
</svg>
