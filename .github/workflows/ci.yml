name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build, test & lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # GTK4/libadwaita + GStreamer dev headers (mirror README "Debian/Ubuntu").
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gettext desktop-file-utils appstream

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Formatting (rustfmt)
        run: cargo fmt --all --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Tests
        run: cargo test --locked

  metadata:
    name: AppStream, desktop & translations
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream desktop-file-utils gettext

      - name: Validate AppStream metainfo
        run: appstreamcli validate --no-net data/de.cais.Emilia.metainfo.xml

      - name: Validate desktop entry
        run: desktop-file-validate data/de.cais.Emilia.desktop

      - name: Check translation catalogs compile
        run: |
          for po in po/*.po; do
            echo "msgfmt --check $po"
            msgfmt --check "$po" -o /dev/null
          done

  # On a pushed release tag (v*), the version must be consistent everywhere:
  # the git tag, Cargo.toml and the newest <release> in the AppStream metainfo
  # must all match — otherwise a drifted/incomplete release is blocked.
  release-consistency:
    name: Release version consistency
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Tag == Cargo.toml == metainfo
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver=$(sed -n -E 's/^version = "([0-9]+\.[0-9]+\.[0-9]+)".*/\1/p' Cargo.toml | head -1)
          meta_ver=$(grep -m1 -oE 'release version="[0-9]+\.[0-9]+\.[0-9]+"' \
            data/de.cais.Emilia.metainfo.xml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "tag=$tag  cargo=$cargo_ver  metainfo=$meta_ver"
          fail=0
          [ "$tag" = "$cargo_ver" ] || { echo "::error::Cargo.toml ($cargo_ver) != tag ($tag)"; fail=1; }
          [ "$tag" = "$meta_ver" ]  || { echo "::error::newest metainfo release ($meta_ver) != tag ($tag)"; fail=1; }
          exit $fail
